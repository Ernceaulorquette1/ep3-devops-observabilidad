global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:

  - job_name: "microservicio-ep3"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "microservicio:8000"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"